name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below to help us identify and fix the issue.

  - type: dropdown
    id: service
    attributes:
      label: Affected Service / Component
      options:
        - Backend
        - Frontend
        - Proxy Server
        - SDK (TypeScript)
        - SDK (Python)
        - OPA / Policy Engine
        - CSRG
        - Agent
        - Admin Dashboard
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical — service down or data loss
        - High — major feature broken, no workaround
        - Medium — feature broken, workaround exists
        - Low — minor issue, cosmetic
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Production
        - Staging
        - Development / Local
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Observe error

        Include API request/response, curl commands, or screenshots if applicable.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs, error messages, or attach screenshots.
      placeholder: Paste logs or drag-and-drop screenshots here.

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have searched for existing issues before creating this one.
          required: true
